<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Check-in — Leitor de QR Code</title>
  <link rel="stylesheet" href="css/checkin.css" />
</head>
<body>
  <div id="app">
    <header>
      <div class="header-brand">
        <span class="header-icon">📷</span>
        <span>Check-in — Evento</span>
      </div>
      <div class="header-actions">
        <button id="btn-toggle-camera" class="btn-header hidden" title="Alternar câmera">🔄</button>
      </div>
    </header>

    <main>
      <!-- Tela inicial: botões de ação -->
      <section id="start-section">
        <button id="btn-open-camera" class="btn btn-camera">📷 Abrir Câmera</button>
        <div class="divider"><span>ou</span></div>
        <div class="manual-input-wrapper">
          <input type="text" id="manual-code" placeholder="Digite o código do ingresso" autocomplete="off" />
          <button id="btn-submit-manual" class="btn btn-primary">Verificar</button>
        </div>
      </section>

      <!-- Scanner (oculto até clicar) -->
      <section id="scanner-section" class="hidden">
        <div id="reader"></div>
        <p class="scanner-hint">Aponte a câmera para o QR Code do ingresso</p>
        <button id="btn-close-camera" class="btn btn-secondary btn-sm">Fechar Câmera</button>
      </section>

      <!-- Resultado -->
      <section id="result-section" class="hidden">
        <div id="result-card" class="result-card">
          <div class="result-icon" id="result-icon"></div>
          <div class="result-status" id="result-status"></div>
          <div class="result-name" id="result-name"></div>
          <div class="result-details" id="result-details"></div>
          <div class="result-time" id="result-time"></div>
        </div>

        <!-- Botão de imprimir fora do card, grande e visível -->
        <button id="btn-print-label" class="btn btn-print hidden">🖨️ Imprimir Etiqueta</button>
        <div id="print-status" class="print-status hidden"></div>

        <button id="btn-next" class="btn btn-next">Próximo Check-in</button>
      </section>

      <!-- Canvas oculto para gerar a etiqueta -->
      <canvas id="label-canvas" class="hidden"></canvas>

      <!-- Contador -->
      <div class="counter-bar">
        <span>Check-ins realizados: <strong id="checkin-count">0</strong></span>
      </div>
    </main>
  </div>

  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script src="js/checkin.js"></script>
</body>
</html>
